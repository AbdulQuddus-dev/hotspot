<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- ============================================================
       شبكة الأزرق نت — صفحة تسجيل الدخول (Hotspot Login)
       MikroTik RouterOS Captive Portal — login.html
       ============================================================ -->

  <title>الأزرق نت — سجّل دخولك</title>
  <link rel="stylesheet" href="style.css" />

  <!-- ── حماية ضد Clickjacking ── -->
  <style>html{display:none}</style>
  <script>
    if (self === top) { document.documentElement.style.display = 'block'; }
    else { top.location = self.location; }
  </script>
</head>
<body class="page-login">

  <!-- ════════════════════════════════
       خلفية الفيديو (ضع ملف bg_animation.mp4 في نفس المجلد)
       ════════════════════════════════ -->
  <div class="video-wrapper" id="videoWrapper">
    <video
      id="bgVideo"
      class="bg-video"
      src="bg_animation.mp4"
      autoplay
      muted
      playsinline
      preload="auto"
      poster="poster.jpg"
    ></video>
    <!-- طبقة تعتيم شفافة فوق الفيديو -->
    <div class="video-overlay"></div>
  </div>

  <!-- ════════════════════════════════
       نموذج تسجيل الدخول (مخفي حتى اكتمال الأنيميشن)
       ════════════════════════════════ -->
  <div class="form-container" id="loginFormContainer" aria-live="polite">

    <!-- شعار الشبكة -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2.5"/>
          <path d="M10 32 Q32 8 54 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M16 38 Q32 20 48 38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="32" cy="45" r="4" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="brand-name">الأزرق نت</h1>
      <p class="brand-tagline">اتصال سريع · آمن · موثوق</p>
    </div>

    <!-- ─── رسالة الخطأ (يعبئها MikroTik تلقائياً) ─── -->
    <!-- MikroTik: $(if error)$ -->
    <div class="error-banner" id="errorBanner" role="alert" style="display:none">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm1 11H9v-2h2v2zm0-4H9V5h2v4z" fill="currentColor"/></svg>
      <span id="errorText"><!-- $(error)$ --></span>
    </div>
    <!-- MikroTik: $(endif)$ -->

    <!-- ─── النموذج الرئيسي ─── -->
    <!--
      MikroTik Action URL: يُملأ تلقائياً بـ $(link-login-only)$
      method يجب أن يكون POST
    -->
    <form
      id="loginForm"
      method="POST"
      action="$(link-login-only)$"
      autocomplete="off"
      novalidate
      onsubmit="return handleLogin(event)"
    >
      <!-- حقول مخفية يطلبها MikroTik -->
      <input type="hidden" name="dst"        value="$(link-orig)$" />
      <input type="hidden" name="popup"      value="true" />
      <input type="hidden" name="username"   id="hiddenUsername" />
      <input type="hidden" name="password"   id="hiddenPassword" />

      <!-- ── رقم الكرت / الكود ── -->
      <div class="field-group">
        <label for="cardNumber" class="field-label">رقم الكرت أو اسم المستخدم</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M2 10h20" stroke="currentColor" stroke-width="2"/></svg>
          </span>
          <input
            type="text"
            id="cardNumber"
            name="card"
            placeholder="أدخل رقم الكرت"
            maxlength="64"
            required
            autocomplete="off"
            inputmode="numeric"
            aria-required="true"
          />
        </div>
        <span class="field-error" id="cardError" role="alert"></span>
      </div>

      <!-- ── كلمة المرور (اختيارية — تظهر للأكواد ذات المرور) ── -->
      <div class="field-group" id="passwordGroup" style="display:none">
        <label for="cardPassword" class="field-label">كلمة المرور</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
          </span>
          <input
            type="password"
            id="cardPassword"
            name="passwd"
            placeholder="كلمة المرور (إن وُجدت)"
            maxlength="64"
            autocomplete="off"
          />
          <button type="button" class="toggle-pw" aria-label="إظهار / إخفاء كلمة المرور" onclick="togglePassword()">
            <svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12C1 12 5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
        </div>
      </div>

      <!-- ── زر الاتصال ── -->
      <button type="submit" class="btn-connect" id="connectBtn" aria-live="polite">
        <span class="btn-text">اتصل الآن</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>

      <!-- ── رابط الحالة ── -->
      <p class="status-link-row">
        هل أنت متصل بالفعل؟
        <a href="$(link-status)$" class="link-inline">تحقق من الحالة</a>
      </p>
    </form>

    <!-- فاصل الـ footer -->
    <footer class="portal-footer">
      <p>شبكة <strong>الأزرق نت</strong></p>
      <p class="footer-eng">تصميم وبرمجة: <span class="eng-name">المهندس عبدالقدوس</span></p>
    </footer>

  </div><!-- /form-container -->

  <!-- ════════════════════════════════
       نقطة تحميل النصوص البرمجية
       ════════════════════════════════ -->
  <script src="md5.js"></script>
  <script src="custom.js"></script>

  <script>
  /* ─────────────────────────────────────────────
     منطق تسجيل الدخول: التحقق + تشفير MD5
  ───────────────────────────────────────────── */

  /** يُظهر/يُخفي كلمة المرور */
  function togglePassword() {
    var pw = document.getElementById('cardPassword');
    pw.type = (pw.type === 'password') ? 'text' : 'password';
  }

  /** تعقيم مدخلات المستخدم: إزالة أحرف الـ HTML الخطرة */
  function sanitize(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;')
      .trim();
  }

  /** التحقق من صحة الحقول قبل الإرسال */
  function validateForm(card) {
    var ok = true;
    var cardErr = document.getElementById('cardError');
    cardErr.textContent = '';

    if (!card || card.length < 3) {
      cardErr.textContent = 'يرجى إدخال رقم الكرت أو اسم المستخدم.';
      ok = false;
    } else if (card.length > 64) {
      cardErr.textContent = 'الرقم طويل جداً.';
      ok = false;
    }
    // حماية XSS: رفض أي حرف HTML
    if (/[<>"'&]/.test(card)) {
      cardErr.textContent = 'يحتوي على رموز غير مسموح بها.';
      ok = false;
    }
    return ok;
  }

  /** معالج إرسال النموذج */
  function handleLogin(e) {
    e.preventDefault();
    var rawCard = document.getElementById('cardNumber').value;
    var rawPass = document.getElementById('cardPassword').value;

    // تعقيم
    var card = sanitize(rawCard);
    var pass = rawPass ? sanitize(rawPass) : '';

    if (!validateForm(card)) return false;

    // تعيين الحقول المخفية
    document.getElementById('hiddenUsername').value = card;

    /*
     * MikroTik يتوقع كلمة المرور إما نصاً صريحاً أو MD5 مشفراً
     * نستخدم MD5 (من md5.js) لزيادة الأمان عبر الشبكة المحلية
     */
    if (typeof calcMD5 === 'function' && pass) {
      document.getElementById('hiddenPassword').value = calcMD5(pass);
    } else {
      document.getElementById('hiddenPassword').value = pass;
    }

    // إظهار حالة التحميل
    var btn = document.getElementById('connectBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    // إرسال النموذج
    e.target.submit();
    return false;
  }

  /* ─── إظهار رسالة الخطأ إذا كانت موجودة في الـ URL ─── */
  (function checkError() {
    // MikroTik يُمرر الخطأ كمتغير $(error)$ مباشرة داخل HTML
    // لكن نتحقق أيضاً من query string كإجراء احتياطي
    var params = new URLSearchParams(window.location.search);
    var errMsg = params.get('error');
    if (errMsg) {
      var banner = document.getElementById('errorBanner');
      var errText = document.getElementById('errorText');
      banner.style.display = 'flex';
      errText.textContent = decodeURIComponent(errMsg.replace(/\+/g, ' '));
    }
  })();
  </script>

</body>
</html>
