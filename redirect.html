<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- ============================================================
       شبكة الأزرق نت — إعادة التوجيه التلقائي

  <title>الأزرق نت — جارٍ التوجيه</title>
  <link rel="stylesheet" href="style.css" />

<body class="page-redirect">

    <div class="spinner-large" aria-label="جارٍ التوجيه" role="status">
      <div class="spinner-ring"></div>
    </div>
    <h2 class="redirect-heading">جارٍ التوجيه...</h2>
    <p class="redirect-subtext">يرجى الانتظار لحظة واحدة</p>
    <footer class="portal-footer">
      <p>شبكة <strong>الأزرق نت</strong></p>
      <p class="footer-eng">تصميم وبرمجة: <span class="eng-name">المهندس عبدالقدوس</span></p>
    </footer>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = '$(link-redirect)$' || '$(link-login)$';
    }, 1500);
  </script>
</body>
</html>
