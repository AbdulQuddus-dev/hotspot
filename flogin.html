<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- ============================================================
       شبكة الأزرق نت — صفحة فشل تسجيل الدخول
       MikroTik RouterOS Captive Portal — flogin.html
       تُستخدم ببعض المتصفحات التي لا تدعم redirection
       ============================================================ -->
  <title>الأزرق نت — خطأ في تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css" />
  <style>html{display:none}</style>
  <script>if(self===top)document.documentElement.style.display='block';else top.location=self.location;</script>
</head>
<body class="page-flogin">
  <div class="centered-card card--error">

    <div class="result-icon result-icon--error" aria-hidden="true">
      <svg viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="38" stroke="currentColor" stroke-width="3"/>
        <path d="M28 28l24 24M52 28L28 52" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="result-title">فشل تسجيل الدخول</h1>

    <!-- رسالة الخطأ من MikroTik -->
    <!-- MikroTik: $(error)$ -->
    <div class="error-banner error-banner--inline" role="alert">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm1 11H9v-2h2v2zm0-4H9V5h2v4z" fill="currentColor"/></svg>
      <span><!-- $(error)$ --></span>
    </div>

    <!-- نموذج إعادة المحاولة -->
    <form
      id="retryForm"
      method="POST"
      action="$(link-login-only)$"
      autocomplete="off"
      novalidate
      onsubmit="return handleLogin(event)"
    >
      <input type="hidden" name="dst"      value="$(link-orig)$" />
      <input type="hidden" name="popup"    value="true" />
      <input type="hidden" name="username" id="hiddenUsername" />
      <input type="hidden" name="password" id="hiddenPassword" />

      <div class="field-group">
        <label for="cardNumber" class="field-label">رقم الكرت أو اسم المستخدم</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M2 10h20" stroke="currentColor" stroke-width="2"/></svg>
          </span>
          <input type="text" id="cardNumber" name="card" placeholder="أدخل رقم الكرت" maxlength="64" required autocomplete="off" />
        </div>
        <span class="field-error" id="cardError" role="alert"></span>
      </div>

      <button type="submit" class="btn-connect" id="connectBtn">
        <span class="btn-text">إعادة المحاولة</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <div class="action-row">
      <a href="$(link-login)$" class="btn-outline">العودة للرئيسية</a>
    </div>

    <footer class="portal-footer">
      <p>شبكة <strong>الأزرق نت</strong></p>
      <p class="footer-eng">تصميم وبرمجة: <span class="eng-name">المهندس عبدالقدوس</span></p>
    </footer>
  </div>

  <script src="md5.js"></script>
  <script>
    function sanitize(s) { return String(s).replace(/[<>"'&]/g,'').trim(); }
    function handleLogin(e) {
      e.preventDefault();
      var card = sanitize(document.getElementById('cardNumber').value);
      var err  = document.getElementById('cardError');
      err.textContent = '';
      if (!card || card.length < 3) { err.textContent = 'يرجى إدخال رقم صحيح.'; return false; }
      document.getElementById('hiddenUsername').value = card;
      document.getElementById('hiddenPassword').value = '';
      var btn = document.getElementById('connectBtn');
      btn.classList.add('loading'); btn.disabled = true;
      e.target.submit(); return false;
    }
  </script>
</body>
</html>
